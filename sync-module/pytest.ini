[pytest]
# New unit suite lives under tests/unit. The legacy scripts in tests/
# (test_cmp.py, test_evt.py, ...) run code on import and read real Lynx
# hardware files, so they are intentionally excluded from collection.
testpaths = tests/unit
pythonpath = .
python_files = test_*.py
python_functions = test_*
addopts = -ra
